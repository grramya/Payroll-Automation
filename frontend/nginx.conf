server {
    listen 80;
    root  /usr/share/nginx/html;
    index index.html;

    # ── Security headers ────────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy        "strict-origin" always;

    # Content Security Policy — tightened to prevent XSS injection
    # 'unsafe-inline' for style-src is required by MUI (CSS-in-JS)
    # Extend connect-src if you add external analytics or CDNs
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Prevent MIME-type sniffing already covered by X-Content-Type-Options,
    # but also instruct browsers that support Permissions-Policy
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── React Router — serve index.html for every non-file route ───────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API reverse proxy → FastAPI backend ────────────────────────────────────
    # /api/v1/* is the canonical versioned path: nginx strips /v1 before forwarding.
    # /api/* is kept as a backward-compat alias (no stripping) so existing
    # Swagger UI links and curl commands continue to work.
    location /api/v1/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering    off;
        proxy_cache        off;
    }

    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering    off;
        proxy_cache        off;
    }

    # ── Static asset caching ───────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Compression ────────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json
                    application/javascript text/xml application/xml
                    image/svg+xml;
}
