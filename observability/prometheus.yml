global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # OTEL collector forwards backend metrics here
  - job_name: payroll_backend
    static_configs:
      - targets: ['otel-collector:8889']

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
