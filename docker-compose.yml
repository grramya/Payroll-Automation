services:

  # ── FastAPI backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      # auth.db is stored in the named volume, not inside the image
      - PJE_DATA_DIR=/data/db
    volumes:
      # Persistent database (named volume — survives container rebuilds)
      - db_data:/data/db
      # Bind-mount data dirs so you can access files directly on the host
      - ./backend/Mapping:/app/Mapping
      - ./backend/logs:/app/logs
      - ./backend/inputs:/app/inputs
      - ./backend/JE:/app/JE
      - ./backend/consolidated:/app/consolidated
      - ./backend/qbo/tokens.json:/app/qbo/tokens.json
    networks:
      - payroll_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ── React frontend served by nginx ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"       # change to "443:443" when adding HTTPS/SSL
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - payroll_net

networks:
  payroll_net:
    driver: bridge

volumes:
  db_data:    # named volume — auth.db persists here across rebuilds
